version: "3.8"

services:
  frontend:
    build: ./client
    image: Pradeep079/frontend:latest
    ports:
      - "3000:80"
    depends_on:
      - backend

  backend:
    build: .
    image: Pradeep079/backend:latest
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/mydb
    depends_on:
      - mongo

  mongo:
    image: mongo
    ports:
      - "27017:27017"