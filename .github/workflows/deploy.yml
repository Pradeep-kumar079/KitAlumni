name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout Code
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. Setup Node
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # 3. Install backend dependencies
      - name: Install Backend Dependencies
        run: npm install

      # 4. Build frontend
      - name: Build Frontend
        run: |
          cd client
          npm install
          npm run build

      # 5. Login to Docker Hub
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 6. Build Docker images (NO CACHE 🔥)
      - name: Build Docker Images
        run: docker compose build --no-cache

      # 7. Push Docker images
      - name: Push Images
        run: docker compose push

      # 8. Deploy to EC2 (FULL FIX 🔥)
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "🚀 Deploying latest version..."

            cd ~/KitAlumni

            # 🔥pull latest code (important)
            git pull

            # 🔥 Stop old containers
            docker-compose down

            # 🔥 Clean old unused stuff
            docker system prune -af

            # 🔥 Pull latest images
            docker-compose pull

            # 🔥 FORCE new containers (VERY IMPORTANT)
            docker-compose up -d

            echo "✅ Deployment complete"