server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ✅ Serve static files correctly
    location /static/ {
        try_files $uri =404;
    }

    # ✅ React SPA routing ONLY for non-static routes
    location / {
        try_files $uri /index.html;
    }

    error_page 500 502 503 504 /50x.html;

    location = /50x.html {
        root /usr/share/nginx/html;
    }
}